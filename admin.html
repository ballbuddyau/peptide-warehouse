<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — Peptide Warehouse Australia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  // ── EmailJS config — fill these in after creating your EmailJS account ──
  const EMAILJS_PUBLIC_KEY  = 'YOUR_EMAILJS_PUBLIC_KEY';
  const EMAILJS_SERVICE_ID  = 'YOUR_EMAILJS_SERVICE_ID';
  const EMAILJS_TEMPLATE_TRACKING = 'YOUR_TRACKING_TEMPLATE_ID';
  const EMAILJS_TEMPLATE_REPLY    = 'YOUR_REPLY_TEMPLATE_ID';
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0c0d0f;color:#f0f0f0;min-height:100vh;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:inherit;}

/* ── LOGIN ─────────────────────────────────────────────────── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-box{width:100%;max-width:380px;border:1px solid #222;background:#111315;padding:2.5rem;}
.login-logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:0.3rem;}
.login-logo span{color:#006B96;}
.login-sub{font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:2rem;}
.login-label{font-size:0.6rem;letter-spacing:1.5px;text-transform:uppercase;color:#666;display:block;margin-bottom:0.4rem;}
.login-input{width:100%;background:#0c0d0f;border:1px solid #222;color:#f0f0f0;padding:0.7rem 0.9rem;font-size:0.82rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:1rem;}
.login-input:focus{border-color:#006B96;}
.login-btn{width:100%;background:#006B96;color:#fff;border:none;padding:0.8rem;font-size:0.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-family:'Inter',sans-serif;}
.login-btn:hover{background:#0087bc;}
.login-error{font-size:0.7rem;color:#e53;margin-top:0.6rem;display:none;}

/* ── ADMIN SHELL ───────────────────────────────────────────── */
#admin-screen{display:none;min-height:100vh;}
.admin-nav{background:#111315;border-bottom:1px solid #1e2022;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.admin-nav-logo{font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;}
.admin-nav-logo span{color:#006B96;}
.admin-nav-meta{font-size:0.6rem;color:#333;margin-left:0.6rem;}
.admin-nav-right{display:flex;align-items:center;gap:1rem;}
.admin-nav-user{font-size:0.62rem;color:#555;letter-spacing:1px;}
.logout-btn{font-size:0.58rem;letter-spacing:1.5px;text-transform:uppercase;background:transparent;border:1px solid #333;color:#666;padding:0.3rem 0.8rem;}
.logout-btn:hover{border-color:#e53;color:#e53;}

.admin-body{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 56px);}
.admin-sidebar{background:#0f1012;border-right:1px solid #1e2022;padding:1.5rem 0;}
.nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.65rem 1.5rem;font-size:0.68rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:#555;cursor:pointer;transition:all .15s;border-left:2px solid transparent;position:relative;}
.nav-item:hover{color:#aaa;background:rgba(255,255,255,0.02);}
.nav-item.active{color:#006B96;border-left-color:#006B96;background:rgba(0,107,150,0.07);}
.nav-item-icon{font-size:0.95rem;width:18px;text-align:center;}
.nav-badge{background:#e53;color:#fff;border-radius:50%;width:16px;height:16px;font-size:0.48rem;display:none;align-items:center;justify-content:center;font-weight:700;margin-left:auto;}
.nav-badge.show{display:flex;}

.admin-main{padding:2rem;overflow:auto;}

/* ── STATS BAR ─────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:#111315;border:1px solid #1e2022;padding:1.2rem 1.5rem;}
.stat-label{font-size:0.52rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:0.4rem;}
.stat-val{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:700;color:#fff;line-height:1;}
.stat-sub{font-size:0.58rem;color:#555;margin-top:0.3rem;}
.stat-card.blue .stat-val{color:#006B96;}

/* ── PAGE HEADER ──────────────────────────────────────────── */
.page-header{margin-bottom:1.5rem;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.page-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;}
.page-sub{font-size:0.68rem;color:#555;margin-top:0.2rem;}

/* ── FILTERS ──────────────────────────────────────────────── */
.filter-bar{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.2rem;align-items:center;}
.filter-btn{font-size:0.56rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;background:transparent;border:1px solid #222;padding:0.28rem 0.75rem;color:#555;transition:all .15s;font-family:'Inter',sans-serif;}
.filter-btn.active,.filter-btn:hover{background:#006B96;color:#fff;border-color:#006B96;}
.search-box{background:#111315;border:1px solid #222;color:#f0f0f0;padding:0.32rem 0.8rem;font-size:0.72rem;font-family:'Inter',sans-serif;outline:none;width:220px;}
.search-box:focus{border-color:#006B96;}
.btn-refresh{margin-left:auto;font-size:0.56rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;background:#006B96;border:none;padding:0.35rem 0.9rem;color:#fff;font-family:'Inter',sans-serif;}
.btn-refresh:hover{background:#0087bc;}

/* ── TABLE ────────────────────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:0.72rem;}
.tbl th{background:#0f1012;font-size:0.52rem;letter-spacing:1.5px;text-transform:uppercase;color:#555;font-weight:500;padding:0.7rem 1rem;text-align:left;border-bottom:1px solid #1e2022;}
.tbl td{padding:0.85rem 1rem;border-bottom:1px solid #18191b;color:#bbb;vertical-align:middle;}
.tbl tr:hover td{background:rgba(255,255,255,0.015);}
.order-ref{font-family:'Syne',sans-serif;font-weight:700;color:#fff;font-size:0.78rem;}
.cust-name{color:#fff;font-weight:500;}
.cust-email{font-size:0.62rem;color:#555;margin-top:0.1rem;}

/* STATUS PILLS */
.pill{display:inline-flex;align-items:center;font-size:0.5rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;padding:0.18rem 0.5rem;border:1px solid;}
.pill-pending{background:rgba(245,200,66,.07);color:#c8960a;border-color:rgba(245,200,66,.25);}
.pill-paid{background:rgba(0,107,150,.08);color:#006B96;border-color:rgba(0,107,150,.3);}
.pill-dispatched{background:rgba(30,180,100,.07);color:#1eb464;border-color:rgba(30,180,100,.25);}
.pill-delivered{background:rgba(100,200,100,.07);color:#4caf50;border-color:rgba(100,200,100,.25);}
.pill-cancelled{background:rgba(229,51,51,.07);color:#e53;border-color:rgba(229,51,51,.25);}

/* INLINE BUTTONS */
.row-btn{font-size:0.52rem;letter-spacing:1px;text-transform:uppercase;font-weight:600;background:transparent;border:1px solid #2a2c2e;padding:0.22rem 0.55rem;color:#777;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap;}
.row-btn:hover{border-color:#006B96;color:#006B96;}
.row-btn.green:hover{border-color:#1eb464;color:#1eb464;}
.row-btns{display:flex;gap:0.35rem;flex-wrap:wrap;}

/* ── MODAL ────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:#111315;border:1px solid #222;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;}
.modal-hdr{padding:1.2rem 1.5rem;border-bottom:1px solid #1e2022;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#111315;z-index:5;}
.modal-hdr-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}
.modal-close{background:none;border:none;color:#555;font-size:1.2rem;line-height:1;}
.modal-close:hover{color:#fff;}
.modal-bd{padding:1.5rem;}
.m-section{margin-bottom:1.5rem;}
.m-section-lbl{font-size:0.52rem;letter-spacing:2px;text-transform:uppercase;color:#006B96;font-weight:700;margin-bottom:0.8rem;}
.m-row{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid #18191b;font-size:0.74rem;}
.m-row:last-child{border-bottom:none;}
.m-key{color:#555;}
.m-val{color:#ccc;font-weight:500;text-align:right;max-width:60%;}
.m-item{display:flex;justify-content:space-between;padding:0.45rem 0;border-bottom:1px solid #18191b;font-size:0.7rem;}
.m-item:last-child{border-bottom:none;}

/* FORM ELEMENTS */
.form-box{background:#0f1012;border:1px solid #1e2022;padding:1.2rem;margin-top:0.8rem;}
.f-label{font-size:0.56rem;letter-spacing:1.5px;text-transform:uppercase;color:#555;display:block;margin-bottom:0.4rem;}
.f-input{width:100%;background:#0c0d0f;border:1px solid #222;color:#f0f0f0;padding:0.58rem 0.8rem;font-size:0.78rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:0.8rem;}
.f-input:focus{border-color:#006B96;}
.f-textarea{width:100%;background:#0c0d0f;border:1px solid #222;color:#f0f0f0;padding:0.58rem 0.8rem;font-size:0.78rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:0.8rem;min-height:110px;resize:vertical;}
.f-textarea:focus{border-color:#006B96;}
.f-select{width:100%;background:#0c0d0f;border:1px solid #222;color:#f0f0f0;padding:0.54rem 0.8rem;font-size:0.75rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:0.8rem;}
.f-select:focus{border-color:#006B96;}
.btn-row{display:flex;gap:0.8rem;flex-wrap:wrap;}
.btn-primary{flex:1;min-width:120px;background:#006B96;color:#fff;border:none;padding:0.62rem 1rem;font-size:0.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:'Inter',sans-serif;}
.btn-primary:hover{background:#0087bc;}
.btn-primary.green{background:#1eb464;}
.btn-primary.green:hover{background:#27c970;}
.btn-ghost{background:transparent;border:1px solid #2a2c2e;color:#777;padding:0.62rem 1rem;font-size:0.6rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;font-family:'Inter',sans-serif;}
.btn-ghost:hover{border-color:#aaa;color:#aaa;}
.hint{font-size:0.58rem;color:#444;line-height:1.7;margin-top:0.5rem;}
.hint a{color:#006B96;}

/* ── PRODUCTS ─────────────────────────────────────────────── */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:1rem;}
.prod-card{background:#111315;border:1px solid #1e2022;padding:1.3rem;}
.prod-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;color:#fff;margin-bottom:0.15rem;}
.prod-spec-small{font-size:0.6rem;color:#555;margin-bottom:0.8rem;}
.prod-live-price{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;color:#006B96;line-height:1;margin-bottom:0.15rem;}
.prod-live-label{font-size:0.5rem;letter-spacing:1.5px;text-transform:uppercase;color:#1eb464;margin-bottom:0.9rem;}

/* ── MESSAGES ─────────────────────────────────────────────── */
.msg-card{background:#111315;border:1px solid #1e2022;padding:1.2rem;margin-bottom:0.7rem;cursor:pointer;transition:border-color .15s;}
.msg-card:hover{border-color:#2a2c2e;}
.msg-card.unread{border-left:3px solid #006B96;}
.msg-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.4rem;}
.msg-from{font-weight:600;color:#fff;font-size:0.8rem;}
.msg-time{font-size:0.58rem;color:#555;}
.msg-subject{font-size:0.62rem;letter-spacing:1px;text-transform:uppercase;color:#006B96;margin-bottom:0.35rem;}
.msg-preview{font-size:0.7rem;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.msg-tags{display:flex;gap:0.35rem;margin-top:0.5rem;}
.msg-tag{font-size:0.46rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;padding:0.12rem 0.4rem;border:1px solid;}
.tag-unread{color:#c8960a;border-color:rgba(245,200,66,.25);background:rgba(245,200,66,.07);}
.tag-read{color:#333;border-color:#222;}
.tag-replied{color:#1eb464;border-color:rgba(30,180,100,.25);background:rgba(30,180,100,.07);}

/* ── SETTINGS ─────────────────────────────────────────────── */
.settings-block{background:#111315;border:1px solid #1e2022;padding:1.5rem;margin-bottom:1rem;}
.settings-title{font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;margin-bottom:0.25rem;}
.settings-sub{font-size:0.65rem;color:#555;line-height:1.7;margin-bottom:1.2rem;}
.step{display:flex;gap:0.8rem;padding:0.8rem 0;border-bottom:1px solid #18191b;font-size:0.7rem;}
.step:last-child{border-bottom:none;}
.step-num{font-family:'Syne',sans-serif;font-weight:700;color:#006B96;font-size:1rem;width:20px;flex-shrink:0;}
.step-text{color:#777;line-height:1.8;}
.step-text strong{color:#bbb;}
.step-text code{background:#0c0d0f;color:#006B96;padding:0.1rem 0.4rem;font-size:0.68rem;border:1px solid #222;}
.code-block{background:#0c0d0f;border:1px solid #1e2022;padding:1rem 1.2rem;font-family:monospace;font-size:0.68rem;color:#bbb;line-height:2;margin-top:0.5rem;}

/* ── CHART / ANALYTICS ────────────────────────────────────── */
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:90px;}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.chart-bar{width:100%;background:#006B96;opacity:.75;border-radius:2px 2px 0 0;min-height:0;}
.chart-day{font-size:0.48rem;color:#555;}
.chart-val{font-size:0.46rem;color:#006B96;}

/* ── EMPTY / LOADING ───────────────────────────────────────── */
.empty{text-align:center;padding:4rem 2rem;color:#333;}
.empty-icon{font-size:2.8rem;margin-bottom:0.8rem;}
.empty-text{font-size:0.75rem;line-height:1.9;}
.loading{text-align:center;padding:3rem;color:#444;font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;}

/* ── TOAST ────────────────────────────────────────────────── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#111315;border:1px solid #333;color:#f0f0f0;padding:0.8rem 1.4rem;font-size:0.72rem;font-weight:500;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px;line-height:1.5;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:#1eb464;color:#1eb464;}
.toast.err{border-color:#e53;color:#e53;}

@media(max-width:720px){
  .admin-body{grid-template-columns:1fr;}
  .admin-sidebar{display:none;}
  .stats-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Peptide <span>Warehouse</span></div>
    <div class="login-sub">Admin Portal</div>
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="login-pw" placeholder="Enter admin password" autocomplete="current-password"/>
    <button class="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-error" id="login-err">Incorrect password.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <nav class="admin-nav">
    <div class="admin-nav-logo">Peptide <span>Warehouse</span><span class="admin-nav-meta">Admin</span></div>
    <div class="admin-nav-right">
      <span class="admin-nav-user">admin</span>
      <button class="logout-btn" onclick="doLogout()">Log Out</button>
    </div>
  </nav>
  <div class="admin-body">
    <aside class="admin-sidebar">
      <div class="nav-item active" id="nav-orders"   onclick="showPage('orders')">  <span class="nav-item-icon">📦</span>Orders</div>
      <div class="nav-item"        id="nav-messages" onclick="showPage('messages')"><span class="nav-item-icon">✉️</span>Messages<span class="nav-badge" id="msg-badge">0</span></div>
      <div class="nav-item"        id="nav-products" onclick="showPage('products')"><span class="nav-item-icon">🧪</span>Products</div>
      <div class="nav-item"        id="nav-stats"    onclick="showPage('stats')">   <span class="nav-item-icon">📊</span>Analytics</div>
      <div class="nav-item"        id="nav-settings" onclick="showPage('settings')"><span class="nav-item-icon">⚙️</span>Settings</div>
    </aside>
    <main class="admin-main" id="admin-main"><div class="loading">Loading…</div></main>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-hdr-title" id="modal-title">—</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-bd" id="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, doc, updateDoc, setDoc, query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

/* ── CONFIG ─────────────────────────────────────────────────── */
const ADMIN_PW = 'PeptideAdmin2026!';

const firebaseConfig = {
  apiKey: "AIzaSyCobOW2L2jfdOFR1LF606BVzLngHOedhUY",
  authDomain: "peptide-warehouse.firebaseapp.com",
  projectId: "peptide-warehouse",
  storageBucket: "peptide-warehouse.firebasestorage.app",
  messagingSenderId: "900140364299",
  appId: "1:900140364299:web:eecb3d4c55c8d694bf0d0e"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

/* ── STATE ───────────────────────────────────────────────────── */
let orders   = [];
let messages = [];
let products = [];
let page     = 'orders';
let filter   = 'all';
let search   = '';

const defaultProducts = [
  { name:'Retatrutide',        spec:'10mg · Lyophilised',    price:129.99, cat:'Fat Loss'  },
  { name:'Semax',              spec:'10mg · Lyophilised',    price:69.99,  cat:'Nootropic' },
  { name:'Melanotan I',        spec:'10mg · Lyophilised',    price:69.99,  cat:'Tanning'   },
  { name:'GHK-Cu',             spec:'50mg · Lyophilised',    price:94.99,  cat:'Healing'   },
  { name:'BAC Water',          spec:'10mL · Bacteriostatic', price:19.99,  cat:'Ancillary' },
  { name:'KLOW Peptide Blend', spec:'50mg · Lyophilised',    price:174.99, cat:'Blend'     },
  { name:'Retatrutide Bundle', spec:'Starter Kit',           price:249.99, cat:'Bundle'    },
  { name:'Insulin Needles',    spec:'Pack of 10–100',        price:5.99,   cat:'Ancillary' },
];

/* ── UTILS ───────────────────────────────────────────────────── */
function toast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (type ? ' '+type : '');
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.className='toast'; }, 3500);
}

function fmtDate(ts){ return ts ? new Date(ts.seconds*1000).toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'}) : '—'; }
function fmtDateTime(ts){ return ts ? new Date(ts.seconds*1000).toLocaleString('en-AU',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—'; }
function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : ''; }

/* ── AUTH ────────────────────────────────────────────────────── */
window.doLogin = function(){
  const pw = document.getElementById('login-pw').value;
  if(pw === ADMIN_PW){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('login-pw').value = '';
  }
};
window.doLogout = function(){
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pw').value = '';
};
document.getElementById('login-pw').addEventListener('keydown', e => { if(e.key==='Enter') window.doLogin(); });

/* ── DATA LOADING ────────────────────────────────────────────── */
async function loadAll(){
  document.getElementById('admin-main').innerHTML = '<div class="loading">Loading data…</div>';
  await Promise.all([fetchOrders(), fetchMessages(), fetchProducts()]);
  updateMsgBadge();
  renderPage();
}

async function fetchOrders(){
  try {
    const snap = await getDocs(query(collection(db,'orders'), orderBy('createdAt','desc')));
    orders = snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e){ orders=[]; }
}
async function fetchMessages(){
  try {
    const snap = await getDocs(query(collection(db,'messages'), orderBy('createdAt','desc')));
    messages = snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e){ messages=[]; }
}
async function fetchProducts(){
  try {
    const snap = await getDocs(collection(db,'products'));
    products = defaultProducts.map(def => {
      const saved = snap.docs.find(d => d.data().name === def.name);
      return saved ? {...def,...saved.data(),id:saved.id} : {...def};
    });
  } catch(e){ products = defaultProducts.map(p=>({...p})); }
}

function updateMsgBadge(){
  const n = messages.filter(m=>!m.read).length;
  const b = document.getElementById('msg-badge');
  b.textContent = n;
  b.classList.toggle('show', n>0);
}

window.showPage = function(p){
  page = p;
  ['orders','messages','products','stats','settings'].forEach(x=>{
    document.getElementById('nav-'+x)?.classList.toggle('active', x===p);
  });
  renderPage();
};

function renderPage(){
  if(page==='orders')   renderOrders();
  else if(page==='messages') renderMessages();
  else if(page==='products') renderProducts();
  else if(page==='stats')    renderStats();
  else if(page==='settings') renderSettings();
}

function renderOrders(){
  const main = document.getElementById('admin-main');
  const counts = { all:orders.length };
  ['pending','paid','dispatched','delivered','cancelled'].forEach(s => counts[s]=orders.filter(o=>o.status===s).length);
  const list = orders.filter(o=>{
    const mf = filter==='all' || o.status===filter;
    const ms = !search || [o.ref,o.customerName,o.customerEmail].some(v=>v?.toLowerCase().includes(search));
    return mf && ms;
  });

  main.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Orders</div><div class="page-sub">${orders.length} total orders</div></div>
      <button class="btn-refresh" onclick="window._reload('orders')">↻ Refresh</button>

      ${['all','pending','paid','dispatched','delivered'].map(f=>`
        <button class="filter-btn ${filter===f?'active':''}" onclick="window._filter('${f}')">${cap(f)} (${counts[f]||0})</button>
      `).join('')}
      <input class="search-box" placeholder="Search name / email / ref…" value="${search}" oninput="window._search(this.value)"/>
    </div>
    ${list.length===0 ? `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">${orders.length===0?'No orders yet — they\'ll appear here once customers check out.':'No orders match this filter.'}</div></div>` : `
    <table class="tbl">
      <thead><tr><th>Ref</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
      <tbody>
      ${list.map(o=>`
        <tr>
          <td><div class="order-ref">${o.ref||'—'}</div></td>
          <td><div class="cust-name">${o.customerName||'—'}</div><div class="cust-email">${o.customerEmail||''}</div></td>
          <td style="font-size:0.62rem;color:#555;">${(o.items||[]).map(i=>`${i.qty}× ${i.name}`).join('<br>')}</td>
          <td style="font-family:'Syne',sans-serif;font-weight:700;color:#006B96;">$${(o.total||0).toFixed(2)}</td>
          <td style="font-size:0.65rem;text-transform:capitalize;">${o.paymentMethod||'—'}</td>
          <td><span class="pill pill-${o.status||'pending'}">${o.status||'pending'}</span></td>
          <td style="font-size:0.62rem;color:#555;">${fmtDate(o.createdAt)}</td>
          <td>
            <div class="row-btns">
              <button class="row-btn" onclick="openOrder('${o.id}')">View / Dispatch</button>
              ${o.status==='pending'?`<button class="row-btn green" onclick="quickStatus('${o.id}','paid')">Mark Paid</button>`:''}
              ${o.status==='dispatched'?`<button class="row-btn green" onclick="quickStatus('${o.id}','delivered')">Delivered</button>`:''}
            </div>
          </td>
        </tr>`).join('')}

    </table>`}
  `;
}

window._filter = f => { filter=f; renderOrders(); };
window._search = v => { search=v.toLowerCase(); renderOrders(); };
window._reload = async which => {
  toast('Refreshing…');
  if(which==='orders'){ await fetchOrders(); renderOrders(); }
  else if(which==='messages'){ await fetchMessages(); renderMessages(); updateMsgBadge(); }
  toast('Refreshed ✓','ok');
};

window.quickStatus = async function(id, status){

window.saveOrder = async function(id, sendEmail){
  const status   = document.getElementById('mo-status').value;
  const tracking = document.getElementById('mo-tracking').value.trim();
  const notes    = document.getElementById('mo-notes').value.trim();
  const o        = orders.find(x=>x.id===id);
  try {
    const upd = { status };
    if(tracking) upd.trackingNumber = tracking;
    if(notes) upd.notes = notes;
    await updateDoc(doc(db,'orders',id), upd);
    Object.assign(o, upd);
    if(sendEmail){
      if(!tracking){ toast('Enter a tracking number to email the customer','err'); return; }
      await sendTrackingEmail(o, tracking, status);
    } else {
      toast('Order updated ✓','ok');
    }
    closeModal();
    renderOrders();
  } catch(e){ toast('Error saving order','err'); console.error(e); }
};

/* ── TRACKING EMAIL ──────────────────────────────────────────── */
async function sendTrackingEmail(o, tracking, status){
  if(EMAILJS_PUBLIC_KEY === 'YOUR_EMAILJS_PUBLIC_KEY'){
    toast('EmailJS not configured yet — see Settings tab','err'); return;
  }
  try {
    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_TRACKING, {
      to_email:        o.customerEmail,
      to_name:         o.customerName || 'Valued Customer',
      order_ref:       o.ref,
      order_status:    cap(status),
      tracking_number: tracking,
      tracking_url:    `https://auspost.com.au/mypost/track/#/search?searchTerm=${tracking}`,
      items_summary:   (o.items||[]).map(i=>`${i.qty}x ${i.name}`).join(', '),
      total:           '$'+(o.total||0).toFixed(2)+' AUD',
      shipping_method: o.shippingMethod || 'Australia Post',
      from_name:       'Peptide Warehouse Australia',
      reply_to:        'info@auspeptidewarehouse.au',
    });
    toast('✓ Tracking email sent to '+o.customerEmail,'ok');
  } catch(e){
    toast('Email failed: '+(e.text||e.message||'Unknown error'),'err');
    console.error(e);
  }
}

/* ════════════════════════════════════════════════════════════
   ANALYTICS
════════════════════════════════════════════════════════════ */
function renderStats(){
  const main = document.getElementById('admin-main');
  const paid  = orders.filter(o=>['paid','dispatched','delivered'].includes(o.status));
  const rev   = paid.reduce((s,o)=>s+(o.total||0),0);
  const avg   = paid.length ? rev/paid.length : 0;
  const ppCount  = orders.filter(o=>o.paymentMethod==='paypal').length;
  const piCount  = orders.filter(o=>o.paymentMethod==='payid').length;
  const bkCount  = orders.filter(o=>o.paymentMethod==='bank').length;
  const pCounts  = {};
  orders.forEach(o=>(o.items||[]).forEach(i=>{ pCounts[i.name]=(pCounts[i.name]||0)+i.qty; }));
  const topProds = Object.entries(pCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const today = new Date(); today.setHours(23,59,59,999);
  const days  = Array.from({length:7},(_,d)=>{
    const day = new Date(today); day.setDate(day.getDate()-(6-d));
    const start = new Date(day); start.setHours(0,0,0,0);
    const end   = new Date(day); end.setHours(23,59,59,999);
    const r = orders.filter(o=>o.createdAt&&o.status!=='cancelled').filter(o=>{
      const t=o.createdAt.seconds*1000; return t>=start.getTime()&&t<=end.getTime();
    }).reduce((s,o)=>s+(o.total||0),0);
    return { label:day.toLocaleDateString('en-AU',{weekday:'short'}), rev:r };
  });
  const maxRev = Math.max(...days.map(d=>d.rev),1);

  main.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Analytics</div><div class="page-sub">Sales overview</div></div>
      <button class="btn-refresh" onclick="loadAll()">↻ Refresh All</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card blue"><div class="stat-label">Total Revenue</div><div class="stat-val">$${rev.toFixed(0)}</div><div class="stat-sub">AUD · paid orders</div></div>
      <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-val">${orders.length}</div><div class="stat-sub">${orders.filter(o=>o.status==='pending').length} awaiting payment</div></div>
      <div class="stat-card"><div class="stat-label">Avg Order Value</div><div class="stat-val">$${avg.toFixed(0)}</div><div class="stat-sub">per paid order</div></div>
      <div class="stat-card"><div class="stat-label">Unread Messages</div><div class="stat-val">${messages.filter(m=>!m.read).length}</div><div class="stat-sub">${messages.length} total</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
      <div style="background:#111315;border:1px solid #1e2022;padding:1.5rem;">
        <div style="font-size:0.52rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:1rem;">Revenue — Last 7 Days</div>
        <div class="chart-bars">
          ${days.map(d=>`
            <div class="chart-bar-wrap">
              <div class="chart-val">${d.rev>0?'$'+d.rev.toFixed(0):''}</div>
              <div class="chart-bar" style="height:${Math.round((d.rev/maxRev)*70)}px;"></div>
              <div class="chart-day">${d.label}</div>
            </div>`).join('')}
        </div>
      </div>
      <div style="background:#111315;border:1px solid #1e2022;padding:1.5rem;">
        <div style="font-size:0.52rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:1rem;">Payment Methods</div>
        ${[['PayPal',ppCount,'#006B96'],['PayID',piCount,'#1eb464'],['Bank',bkCount,'#c8960a']].map(([n,c,col])=>`
          <div style="display:flex;align-items:center;gap:0.8rem;margin-bottom:0.8rem;">
            <div style="width:55px;font-size:0.65rem;color:#777">${n}</div>
            <div style="flex:1;background:#1a1c1e;height:5px;border-radius:3px;overflow:hidden;"><div style="width:${orders.length?Math.round((c/orders.length)*100):0}%;background:${col};height:100%"></div></div>
            <div style="font-size:0.7rem;color:#ccc;font-weight:600;width:22px;text-align:right">${c}</div>
          </div>`).join('')}
      </div>
    </div>
    <div style="background:#111315;border:1px solid #1e2022;padding:1.5rem;">
      <div style="font-size:0.52rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:1rem;">Top Products by Units Sold</div>
      ${topProds.length===0?`<div style="color:#333;font-size:0.72rem">No sales data yet.</div>`:
        topProds.map(([name,qty],i)=>`
          <div style="display:flex;align-items:center;gap:1rem;padding:0.55rem 0;border-bottom:1px solid #18191b;">
            <div style="font-family:'Syne',sans-serif;font-weight:700;color:#2a2c2e;width:18px">${i+1}</div>
            <div style="flex:1;font-size:0.75rem;color:#bbb">${name}</div>
            <div style="font-family:'Syne',sans-serif;font-weight:700;color:#006B96">${qty} units</div>
          </div>`).join('')}
    </div>
  `;
}
