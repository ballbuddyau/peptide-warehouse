<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — Peptide Warehouse Australia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0c0d0f;color:#f0f0f0;min-height:100vh;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:inherit;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0c0d0f;}
.login-box{width:100%;max-width:380px;border:1px solid #222;background:#111315;padding:2.5rem;}
.login-logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:0.3rem;}
.login-logo span{color:#006B96;}
.login-sub{font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:2rem;}
.login-label{font-size:0.6rem;letter-spacing:1.5px;text-transform:uppercase;color:#666;display:block;margin-bottom:0.4rem;}
.login-input{width:100%;background:#0c0d0f;border:1px solid #222;color:#f0f0f0;padding:0.7rem 0.9rem;font-size:0.82rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:1rem;}
.login-input:focus{border-color:#006B96;}
.login-btn{width:100%;background:#006B96;color:#fff;border:none;padding:0.8rem;font-size:0.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-family:'Inter',sans-serif;}
.login-btn:hover{background:#0087bc;}
.login-error{font-size:0.7rem;color:#e53;margin-top:0.6rem;display:none;}

/* ADMIN LAYOUT */
#admin-screen{display:none;min-height:100vh;}
.admin-nav{background:#111315;border-bottom:1px solid #1e2022;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.admin-nav-logo{font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;color:#fff;}
.admin-nav-logo span{color:#006B96;}
.admin-nav-right{display:flex;align-items:center;gap:1rem;}
.admin-nav-user{font-size:0.62rem;color:#666;letter-spacing:1px;}
.admin-logout{font-size:0.6rem;letter-spacing:1.5px;text-transform:uppercase;background:transparent;border:1px solid #333;color:#888;padding:0.3rem 0.8rem;}
.admin-logout:hover{border-color:#e53;color:#e53;}

.admin-body{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 56px);}
.admin-sidebar{background:#0f1012;border-right:1px solid #1e2022;padding:1.5rem 0;}
.admin-nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.65rem 1.5rem;font-size:0.7rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:#555;cursor:pointer;transition:all .15s;border-left:2px solid transparent;}
.admin-nav-item:hover{color:#aaa;background:rgba(255,255,255,0.03);}
.admin-nav-item.active{color:#006B96;border-left-color:#006B96;background:rgba(0,107,150,0.08);}
.admin-nav-icon{font-size:1rem;width:18px;text-align:center;}

.admin-main{padding:2rem;overflow:auto;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:#111315;border:1px solid #1e2022;padding:1.2rem 1.5rem;}
.stat-label{font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:0.5rem;}
.stat-val{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:700;color:#fff;line-height:1;}
.stat-sub{font-size:0.6rem;color:#555;margin-top:0.3rem;}
.stat-card.highlight .stat-val{color:#006B96;}

/* PAGE HEADERS */
.page-header{margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
.page-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;color:#fff;}
.page-sub{font-size:0.7rem;color:#555;margin-top:0.2rem;}

/* FILTERS */
.filter-bar{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.2rem;align-items:center;}
.filter-btn{font-size:0.58rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;background:transparent;border:1px solid #222;padding:0.3rem 0.8rem;color:#555;transition:all .15s;font-family:'Inter',sans-serif;}
.filter-btn.active,.filter-btn:hover{background:#006B96;color:#fff;border-color:#006B96;}
.search-input{background:#111315;border:1px solid #222;color:#f0f0f0;padding:0.35rem 0.8rem;font-size:0.72rem;font-family:'Inter',sans-serif;outline:none;width:220px;}
.search-input:focus{border-color:#006B96;}
.refresh-btn{font-size:0.58rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;background:#006B96;border:none;padding:0.35rem 0.9rem;color:#fff;font-family:'Inter',sans-serif;margin-left:auto;}
.refresh-btn:hover{background:#0087bc;}

/* ORDERS TABLE */
.orders-table{width:100%;border-collapse:collapse;font-size:0.72rem;}
.orders-table th{background:#0f1012;font-size:0.55rem;letter-spacing:1.5px;text-transform:uppercase;color:#555;font-weight:500;padding:0.7rem 1rem;text-align:left;border-bottom:1px solid #1e2022;}
.orders-table td{padding:0.9rem 1rem;border-bottom:1px solid #1a1c1e;color:#ccc;vertical-align:top;}
.orders-table tr:hover td{background:rgba(255,255,255,0.02);}
.order-ref{font-family:'Syne',sans-serif;font-weight:700;color:#fff;font-size:0.78rem;}
.order-customer{color:#fff;font-weight:500;}
.order-customer-email{font-size:0.62rem;color:#555;margin-top:0.1rem;}

/* STATUS BADGES */
.status-badge{display:inline-flex;align-items:center;gap:0.3rem;font-size:0.52rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;padding:0.2rem 0.55rem;border:1px solid;}
.status-pending{background:rgba(245,200,66,.08);color:#c8960a;border-color:rgba(245,200,66,.3);}
.status-paid{background:rgba(0,107,150,.1);color:#006B96;border-color:rgba(0,107,150,.3);}
.status-dispatched{background:rgba(30,180,100,.08);color:#1eb464;border-color:rgba(30,180,100,.3);}
.status-delivered{background:rgba(100,200,100,.08);color:#4caf50;border-color:rgba(100,200,100,.3);}
.status-cancelled{background:rgba(229,51,51,.08);color:#e53;border-color:rgba(229,51,51,.3);}

/* ORDER ACTIONS */
.action-btn{font-size:0.55rem;letter-spacing:1px;text-transform:uppercase;font-weight:600;background:transparent;border:1px solid #333;padding:0.25rem 0.6rem;color:#888;transition:all .15s;font-family:'Inter',sans-serif;}
.action-btn:hover{border-color:#006B96;color:#006B96;}
.action-btn.danger:hover{border-color:#e53;color:#e53;}
.actions-row{display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.4rem;}

/* ORDER DETAIL MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:#111315;border:1px solid #222;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:1.2rem 1.5rem;border-bottom:1px solid #1e2022;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:#fff;}
.modal-close{background:none;border:none;color:#555;font-size:1.2rem;line-height:1;}
.modal-close:hover{color:#fff;}
.modal-body{padding:1.5rem;}
.modal-section{margin-bottom:1.5rem;}
.modal-section-title{font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:#006B96;margin-bottom:0.8rem;font-weight:600;}
.modal-row{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid #1a1c1e;font-size:0.75rem;}
.modal-row:last-child{border-bottom:none;}
.modal-row-key{color:#555;}
.modal-row-val{color:#ccc;font-weight:500;text-align:right;max-width:60%;}
.modal-item{display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid #1a1c1e;font-size:0.72rem;}
.modal-item:last-child{border-bottom:none;}

/* TRACKING FORM */
.tracking-form{background:#0f1012;border:1px solid #1e2022;padding:1.2rem;margin-top:0.8rem;}
.tracking-label{font-size:0.58rem;letter-spacing:1.5px;text-transform:uppercase;color:#555;display:block;margin-bottom:0.4rem;}
.tracking-input{width:100%;background:#0c0d0f;border:1px solid #222;color:#f0f0f0;padding:0.6rem 0.8rem;font-size:0.78rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:0.8rem;}
.tracking-input:focus{border-color:#006B96;}
.tracking-row{display:flex;gap:0.8rem;flex-wrap:wrap;}
.tracking-submit{flex:1;background:#006B96;color:#fff;border:none;padding:0.6rem 1rem;font-size:0.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:'Inter',sans-serif;}
.tracking-submit:hover{background:#0087bc;}

/* STATUS CHANGE */
.status-select{background:#0c0d0f;border:1px solid #222;color:#f0f0f0;padding:0.5rem 0.8rem;font-size:0.72rem;font-family:'Inter',sans-serif;outline:none;width:100%;margin-bottom:0.6rem;}
.status-select:focus{border-color:#006B96;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:4rem 2rem;color:#333;}
.empty-icon{font-size:3rem;margin-bottom:1rem;}
.empty-text{font-size:0.8rem;}

/* LOADING */
.loading{text-align:center;padding:3rem;color:#555;font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;background:#006B96;color:#fff;padding:0.8rem 1.4rem;font-size:0.72rem;font-weight:600;z-index:500;transform:translateY(100px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{background:#e53;}

/* PRODUCTS PAGE */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;}
.product-card{background:#111315;border:1px solid #1e2022;padding:1.2rem;}
.product-card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;color:#fff;margin-bottom:0.2rem;}
.product-card-spec{font-size:0.62rem;color:#555;margin-bottom:0.8rem;}
.product-price{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;color:#006B96;margin-bottom:0.5rem;}
.product-edit-input{width:100%;background:#0c0d0f;border:1px solid #222;color:#f0f0f0;padding:0.45rem 0.7rem;font-size:0.75rem;font-family:'Inter',sans-serif;outline:none;margin-bottom:0.5rem;}
.product-edit-input:focus{border-color:#006B96;}
.product-save-btn{width:100%;background:#006B96;color:#fff;border:none;padding:0.5rem;font-size:0.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-family:'Inter',sans-serif;}

@media(max-width:800px){
  .admin-body{grid-template-columns:1fr;}
  .admin-sidebar{display:none;}
  .stats-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Peptide <span>Warehouse</span></div>
    <div class="login-sub">Admin Portal</div>
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="login-pw" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="admin-screen">
  <nav class="admin-nav">
    <div class="admin-nav-logo">Peptide <span>Warehouse</span> <span style="color:#333;font-size:0.7rem;font-weight:400;margin-left:0.4rem;">Admin</span></div>
    <div class="admin-nav-right">
      <span class="admin-nav-user">admin</span>
      <button class="admin-logout" onclick="doLogout()">Log Out</button>
    </div>
  </nav>
  <div class="admin-body">
    <aside class="admin-sidebar">
      <div class="admin-nav-item active" onclick="showPage('orders')" id="nav-orders"><span class="admin-nav-icon">📦</span>Orders</div>
      <div class="admin-nav-item" onclick="showPage('products')" id="nav-products"><span class="admin-nav-icon">🧪</span>Products</div>
      <div class="admin-nav-item" onclick="showPage('stats')" id="nav-stats"><span class="admin-nav-icon">📊</span>Analytics</div>
    </aside>
    <main class="admin-main" id="admin-main">
      <div class="loading">Loading orders…</div>
    </main>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="order-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-ref">Order Details</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, doc, updateDoc, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCobOW2L2jfdOFR1LF606BVzLngHOedhUY",
  authDomain: "peptide-warehouse.firebaseapp.com",
  projectId: "peptide-warehouse",
  storageBucket: "peptide-warehouse.firebasestorage.app",
  messagingSenderId: "900140364299",
  appId: "1:900140364299:web:eecb3d4c55c8d694bf0d0e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ─── ADMIN PASSWORD ────────────────────────────────────────────
const ADMIN_PASSWORD = 'PeptideAdmin2026!';

// ─── STATE ────────────────────────────────────────────────────
let allOrders = [];
let currentFilter = 'all';
let searchTerm = '';
let currentPage = 'orders';

// Product prices (editable)
const products = [
  { name:'Retatrutide',        spec:'10mg · Lyophilised',         price:129.99 },
  { name:'Semax',              spec:'10mg · Lyophilised',         price:69.99  },
  { name:'Melanotan I',        spec:'10mg · Lyophilised',         price:69.99  },
  { name:'GHK-Cu',             spec:'50mg · Lyophilised',         price:94.99  },
  { name:'BAC Water',          spec:'10mL · Bacteriostatic',      price:19.99  },
  { name:'KLOW Peptide Blend', spec:'50mg · Lyophilised',         price:174.99 },
  { name:'Retatrutide Bundle', spec:'Starter Kit',                price:249.99 },
  { name:'Insulin Needles',    spec:'Pack of 10/20/50/100',       price:5.99   },
];

// ─── LOGIN ─────────────────────────────────────────────────────
window.doLogin = function(){
  const pw = document.getElementById('login-pw').value;
  if(pw === ADMIN_PASSWORD){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadOrders();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-pw').value = '';
  }
};

window.doLogout = function(){
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pw').value = '';
};

// ─── TOAST ────────────────────────────────────────────────────
function showToast(msg, isError=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(()=>{ t.className = 'toast'; }, 3000);
}

// ─── LOAD ORDERS ──────────────────────────────────────────────
async function loadOrders(){
  try {
    const q = query(collection(db,'orders'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    allOrders = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderCurrentPage();
  } catch(e){
    // Collection may be empty or not exist yet
    allOrders = [];
    renderCurrentPage();
  }
}

// ─── PAGE ROUTING ──────────────────────────────────────────────
window.showPage = function(page){
  currentPage = page;
  ['orders','products','stats'].forEach(p => {
    document.getElementById('nav-'+p)?.classList.toggle('active', p===page);
  });
  renderCurrentPage();
};

function renderCurrentPage(){
  if(currentPage === 'orders') renderOrders();
  else if(currentPage === 'products') renderProducts();
  else if(currentPage === 'stats') renderStats();
}

// ─── ORDERS PAGE ───────────────────────────────────────────────
function renderOrders(){
  const main = document.getElementById('admin-main');

  const filtered = allOrders.filter(o => {
    const matchFilter = currentFilter === 'all' || o.status === currentFilter;
    const matchSearch = !searchTerm ||
      o.ref?.toLowerCase().includes(searchTerm) ||
      o.customerName?.toLowerCase().includes(searchTerm) ||
      o.customerEmail?.toLowerCase().includes(searchTerm);
    return matchFilter && matchSearch;
  });

  const counts = {
    all: allOrders.length,
    pending: allOrders.filter(o=>o.status==='pending').length,
    paid: allOrders.filter(o=>o.status==='paid').length,
    dispatched: allOrders.filter(o=>o.status==='dispatched').length,
    delivered: allOrders.filter(o=>o.status==='delivered').length,
  };

  main.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Orders</div><div class="page-sub">${allOrders.length} total orders</div></div>
      <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
    </div>
    <div class="filter-bar">
      ${['all','pending','paid','dispatched','delivered'].map(f=>`
        <button class="filter-btn ${currentFilter===f?'active':''}" onclick="setFilter('${f}')">
          ${f.charAt(0).toUpperCase()+f.slice(1)} (${counts[f]||0})
        </button>`).join('')}
      <input class="search-input" placeholder="Search name, email, ref…" value="${searchTerm}" oninput="setSearch(this.value)"/>
    </div>
    ${filtered.length === 0 ? `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-text">${allOrders.length === 0 ? 'No orders yet. Orders will appear here once customers check out.' : 'No orders match your filter.'}</div>
      </div>` : `
    <table class="orders-table">
      <thead><tr>
        <th>Order Ref</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th><th>Actions</th>
      </tr></thead>
      <tbody>
        ${filtered.map(o => `
          <tr>
            <td><div class="order-ref">${o.ref || '—'}</div></td>
            <td>
              <div class="order-customer">${o.customerName || '—'}</div>
              <div class="order-customer-email">${o.customerEmail || ''}</div>
            </td>
            <td style="font-size:0.65rem;color:#666;">${(o.items||[]).map(i=>`${i.qty}× ${i.name}`).join('<br>')}</td>
            <td style="font-family:'Syne',sans-serif;font-weight:700;color:#006B96;">$${(o.total||0).toFixed(2)}</td>
            <td style="text-transform:capitalize;font-size:0.65rem;">${o.paymentMethod || '—'}</td>
            <td><span class="status-badge status-${o.status||'pending'}">${o.status||'pending'}</span></td>
            <td style="font-size:0.65rem;color:#555;">${o.createdAt ? new Date(o.createdAt.seconds*1000).toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'}) : '—'}</td>
            <td>
              <div class="actions-row">
                <button class="action-btn" onclick="openOrderModal('${o.id}')">View</button>
                ${o.status === 'pending' ? `<button class="action-btn" onclick="updateStatus('${o.id}','paid')">Mark Paid</button>` : ''}
                ${o.status === 'paid' ? `<button class="action-btn" onclick="openDispatchModal('${o.id}')">Dispatch</button>` : ''}
                ${o.status === 'dispatched' ? `<button class="action-btn" onclick="updateStatus('${o.id}','delivered')">Delivered</button>` : ''}
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`}
  `;
}

window.setFilter = function(f){ currentFilter = f; renderOrders(); };
window.setSearch = function(v){ searchTerm = v.toLowerCase(); renderOrders(); };

// ─── UPDATE STATUS ─────────────────────────────────────────────
window.updateStatus = async function(id, status){
  try {
    await updateDoc(doc(db,'orders',id), { status });
    const o = allOrders.find(x=>x.id===id);
    if(o) o.status = status;
    showToast(`Order updated to "${status}"`);
    renderCurrentPage();
  } catch(e){ showToast('Error updating order', true); }
};

// ─── ORDER DETAIL MODAL ────────────────────────────────────────
window.openOrderModal = function(id){
  const o = allOrders.find(x=>x.id===id);
  if(!o) return;
  document.getElementById('modal-ref').textContent = o.ref || 'Order Details';
  document.getElementById('order-modal').classList.add('open');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Customer</div>
      <div class="modal-row"><span class="modal-row-key">Name</span><span class="modal-row-val">${o.customerName||'—'}</span></div>
      <div class="modal-row"><span class="modal-row-key">Email</span><span class="modal-row-val">${o.customerEmail||'—'}</span></div>
      <div class="modal-row"><span class="modal-row-key">Phone</span><span class="modal-row-val">${o.customerPhone||'—'}</span></div>
      <div class="modal-row"><span class="modal-row-key">Address</span><span class="modal-row-val">${o.customerAddress||'—'}</span></div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Order Items</div>
      ${(o.items||[]).map(i=>`
        <div class="modal-item">
          <span style="color:#ccc;">${i.qty}× ${i.name} <span style="color:#555;">${i.spec}</span></span>
          <span style="color:#006B96;font-weight:600;">${i.price}</span>
        </div>`).join('')}
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Payment & Shipping</div>
      <div class="modal-row"><span class="modal-row-key">Payment Method</span><span class="modal-row-val" style="text-transform:capitalize;">${o.paymentMethod||'—'}</span></div>
      ${o.paypalOrderId ? `<div class="modal-row"><span class="modal-row-key">PayPal Order ID</span><span class="modal-row-val" style="font-size:0.62rem;">${o.paypalOrderId}</span></div>` : ''}
      <div class="modal-row"><span class="modal-row-key">Shipping Method</span><span class="modal-row-val">${o.shippingMethod||'—'}</span></div>
      <div class="modal-row"><span class="modal-row-key">Subtotal</span><span class="modal-row-val">$${(o.subtotal||0).toFixed(2)}</span></div>
      ${o.discount > 0 ? `<div class="modal-row"><span class="modal-row-key">Discount ${o.coupon?'('+o.coupon+')':''}</span><span class="modal-row-val" style="color:#1eb464;">−$${o.discount.toFixed(2)}</span></div>` : ''}
      <div class="modal-row"><span class="modal-row-key">Shipping Cost</span><span class="modal-row-val">${o.shipping===0?'Free':'$'+o.shipping?.toFixed(2)}</span></div>
      <div class="modal-row"><span class="modal-row-key" style="font-weight:600;color:#fff;">Total</span><span class="modal-row-val" style="color:#006B96;font-family:'Syne',sans-serif;font-weight:700;">$${(o.total||0).toFixed(2)} AUD</span></div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Status & Tracking</div>
      <div class="modal-row"><span class="modal-row-key">Current Status</span><span class="modal-row-val"><span class="status-badge status-${o.status||'pending'}">${o.status||'pending'}</span></span></div>
      ${o.trackingNumber ? `<div class="modal-row"><span class="modal-row-key">Tracking Number</span><span class="modal-row-val"><a href="https://auspost.com.au/mypost/track/#/search?searchTerm=${o.trackingNumber}" target="_blank" style="color:#006B96;">${o.trackingNumber}</a></span></div>` : ''}

      <div class="tracking-form">
        <label class="tracking-label">Update Status</label>
        <select class="status-select" id="modal-status-select">
          ${['pending','paid','dispatched','delivered','cancelled'].map(s=>`<option value="${s}" ${o.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
        </select>
        <label class="tracking-label">Tracking Number (Australia Post)</label>
        <input class="tracking-input" id="modal-tracking" type="text" placeholder="e.g. EP123456789AU" value="${o.trackingNumber||''}"/>
        <label class="tracking-label">Notes (internal)</label>
        <input class="tracking-input" id="modal-notes" type="text" placeholder="e.g. Packed, awaiting pickup" value="${o.notes||''}"/>
        <div class="tracking-row">
          <button class="tracking-submit" onclick="saveOrderUpdate('${o.id}')">Save & Update Order →</button>
        </div>
      </div>
    </div>
  `;
};

window.saveOrderUpdate = async function(id){
  const status = document.getElementById('modal-status-select').value;
  const tracking = document.getElementById('modal-tracking').value.trim();
  const notes = document.getElementById('modal-notes').value.trim();
  try {
    const updates = { status };
    if(tracking) updates.trackingNumber = tracking;
    if(notes) updates.notes = notes;
    await updateDoc(doc(db,'orders',id), updates);
    const o = allOrders.find(x=>x.id===id);
    if(o){ o.status=status; if(tracking) o.trackingNumber=tracking; if(notes) o.notes=notes; }
    showToast('Order updated successfully ✓');
    closeModal();
    renderCurrentPage();
  } catch(e){ showToast('Error saving update', true); }
};

window.openDispatchModal = function(id){
  openOrderModal(id);
  // Pre-set status to dispatched
  setTimeout(()=>{
    const sel = document.getElementById('modal-status-select');
    if(sel) sel.value = 'dispatched';
  }, 100);
};

window.closeModal = function(){
  document.getElementById('order-modal').classList.remove('open');
};

// Close modal on overlay click
document.getElementById('order-modal').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

// ─── PRODUCTS PAGE ─────────────────────────────────────────────
function renderProducts(){
  const main = document.getElementById('admin-main');
  main.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Products</div><div class="page-sub">Edit product details visible on the storefront</div></div>
    </div>
    <div class="products-grid">
      ${products.map((p,i)=>`
        <div class="product-card">
          <div class="product-card-name">${p.name}</div>
          <div class="product-card-spec">${p.spec}</div>
          <div class="product-price">$${p.price.toFixed(2)} AUD</div>
          <label class="tracking-label">Price (AUD)</label>
          <input class="product-edit-input" id="prod-price-${i}" type="number" step="0.01" value="${p.price}" placeholder="Price"/>
          <label class="tracking-label">Spec / Description</label>
          <input class="product-edit-input" id="prod-spec-${i}" type="text" value="${p.spec}" placeholder="Spec"/>
          <button class="product-save-btn" onclick="saveProduct(${i})">Save Changes</button>
        </div>`).join('')}
    </div>
    <div style="margin-top:1.5rem;padding:1rem 1.2rem;background:#111315;border:1px solid #1e2022;font-size:0.68rem;color:#555;line-height:1.8;">
      ⚠️ <strong style="color:#888;">Note:</strong> Product changes saved here update this admin view only. To update prices on the live site, edit the <code style="color:#006B96;">products</code> array in <code style="color:#006B96;">index.html</code> and push to GitHub.
    </div>
  `;
}

window.saveProduct = function(i){
  const price = parseFloat(document.getElementById(`prod-price-${i}`).value);
  const spec = document.getElementById(`prod-spec-${i}`).value.trim();
  if(!isNaN(price)) products[i].price = price;
  if(spec) products[i].spec = spec;
  showToast(`${products[i].name} updated`);
  renderProducts();
};

// ─── STATS PAGE ────────────────────────────────────────────────
function renderStats(){
  const main = document.getElementById('admin-main');
  const totalRevenue = allOrders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+(o.total||0),0);
  const paidOrders = allOrders.filter(o=>['paid','dispatched','delivered'].includes(o.status));
  const avgOrder = paidOrders.length ? paidOrders.reduce((s,o)=>s+(o.total||0),0)/paidOrders.length : 0;
  const pendingCount = allOrders.filter(o=>o.status==='pending').length;
  const dispatchedCount = allOrders.filter(o=>o.status==='dispatched').length;

  // Sales by payment method
  const paypalOrders = allOrders.filter(o=>o.paymentMethod==='paypal').length;
  const payidOrders = allOrders.filter(o=>o.paymentMethod==='payid').length;
  const bankOrders = allOrders.filter(o=>o.paymentMethod==='bank').length;

  // Top products
  const productCounts = {};
  allOrders.forEach(o=>(o.items||[]).forEach(i=>{ productCounts[i.name]=(productCounts[i.name]||0)+i.qty; }));
  const topProducts = Object.entries(productCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Revenue by day (last 7 days)
  const today = new Date(); today.setHours(23,59,59,999);
  const days = [];
  for(let d=6;d>=0;d--){
    const day = new Date(today); day.setDate(day.getDate()-d);
    const label = day.toLocaleDateString('en-AU',{weekday:'short'});
    const start = new Date(day); start.setHours(0,0,0,0);
    const end = new Date(day); end.setHours(23,59,59,999);
    const rev = allOrders.filter(o=>o.createdAt && o.status!=='cancelled').filter(o=>{
      const t = o.createdAt.seconds*1000;
      return t >= start.getTime() && t <= end.getTime();
    }).reduce((s,o)=>s+(o.total||0),0);
    days.push({label,rev});
  }
  const maxRev = Math.max(...days.map(d=>d.rev), 1);

  main.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Analytics</div><div class="page-sub">Sales and order overview</div></div>
      <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card highlight">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-val">$${totalRevenue.toFixed(0)}</div>
        <div class="stat-sub">AUD (excl. cancelled)</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-val">${allOrders.length}</div>
        <div class="stat-sub">${pendingCount} pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Order Value</div>
        <div class="stat-val">$${avgOrder.toFixed(0)}</div>
        <div class="stat-sub">AUD per paid order</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Awaiting Dispatch</div>
        <div class="stat-val">${dispatchedCount + allOrders.filter(o=>o.status==='paid').length}</div>
        <div class="stat-sub">${allOrders.filter(o=>o.status==='paid').length} paid · ${dispatchedCount} dispatched</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;">
      <div style="background:#111315;border:1px solid #1e2022;padding:1.5rem;">
        <div style="font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:1rem;">Revenue — Last 7 Days</div>
        <div style="display:flex;align-items:flex-end;gap:6px;height:100px;">
          ${days.map(d=>`
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
              <div style="width:100%;background:#006B96;opacity:0.8;border-radius:2px 2px 0 0;height:${Math.round((d.rev/maxRev)*80)}px;min-height:${d.rev>0?4:0}px;transition:height .3s;"></div>
              <div style="font-size:0.5rem;color:#555;white-space:nowrap;">${d.label}</div>
              ${d.rev > 0 ? `<div style="font-size:0.48rem;color:#006B96;">$${d.rev.toFixed(0)}</div>` : ''}
            </div>`).join('')}
        </div>
      </div>

      <div style="background:#111315;border:1px solid #1e2022;padding:1.5rem;">
        <div style="font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:1rem;">Payment Methods</div>
        ${[['PayPal',paypalOrders,'#006B96'],['PayID',payidOrders,'#1eb464'],['Bank Transfer',bankOrders,'#c8960a']].map(([name,count,col])=>`
          <div style="display:flex;align-items:center;gap:0.8rem;margin-bottom:0.8rem;">
            <div style="width:80px;font-size:0.68rem;color:#888;">${name}</div>
            <div style="flex:1;background:#1a1c1e;height:6px;border-radius:3px;overflow:hidden;">
              <div style="width:${allOrders.length?Math.round((count/allOrders.length)*100):0}%;background:${col};height:100%;"></div>
            </div>
            <div style="font-size:0.7rem;color:#ccc;font-weight:600;width:30px;text-align:right;">${count}</div>
          </div>`).join('')}
      </div>
    </div>

    <div style="background:#111315;border:1px solid #1e2022;padding:1.5rem;">
      <div style="font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:1rem;">Top Products by Units Sold</div>
      ${topProducts.length === 0 ? `<div style="color:#333;font-size:0.72rem;">No sales data yet.</div>` :
        topProducts.map(([name,qty],i)=>`
          <div style="display:flex;align-items:center;gap:1rem;padding:0.6rem 0;border-bottom:1px solid #1a1c1e;">
            <div style="font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:700;color:#333;width:20px;">${i+1}</div>
            <div style="flex:1;font-size:0.75rem;color:#ccc;">${name}</div>
            <div style="font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;color:#006B96;">${qty} units</div>
          </div>`).join('')}
    </div>
  `;
}

document.getElementById('login-pw').addEventListener('keydown', function(e){
  if(e.key==='Enter') window.doLogin();
});
